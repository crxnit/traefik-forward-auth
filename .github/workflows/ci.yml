name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:

  go-vet:
    name: go-vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      # -severity high → only High+ findings cause non-zero exit
      - name: gosec (fail on High+)
        run: gosec -severity high -confidence low -fmt text ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      # Accepted-risk vulns (Fixed: N/A upstream, unreachable in our usage):
      #   GO-2026-4880 — Traefik Knative Ingress rule injection (no Knative)
      #   GO-2026-4679 — Traefik K8s Gateway HTTPRoute injection (no K8s gateway)
      #   GO-2026-4484 — Traefik Postgres STARTTLS readTimeout bypass (no Postgres)
      #   GO-2025-4205 — Traefik ingress-nginx TLS verification inversion (no ingress-nginx)
      # We import only traefik/v2/pkg/muxer/http; the vulnerable provider packages
      # are unreachable from our call graph.
      - name: govulncheck
        run: |
          set -o pipefail
          out="$(govulncheck ./... 2>&1)" && { echo "$out"; exit 0; }
          echo "$out"
          echo
          echo "---"
          accepted='GO-2026-4880 GO-2026-4679 GO-2026-4484 GO-2025-4205'
          found="$(echo "$out" | grep -oE 'GO-[0-9]+-[0-9]+' | sort -u)"
          unacceptable=''
          for id in $found; do
            case " $accepted " in *" $id "*) ;; *) unacceptable="$unacceptable $id" ;; esac
          done
          if [ -n "$unacceptable" ]; then
            echo "NEW or unaccepted vulnerabilities:$unacceptable"
            exit 1
          fi
          echo "All reported vulnerabilities are in the accepted-risk allowlist. CI passes."
