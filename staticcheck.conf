# Pure style / simplification checks — disabled so CI stays focused on real bugs
# in upstream code. Revisit if we do a dedicated code-style pass.
#   ST1000  — missing package comments
#   ST1003  — identifier naming (Url -> URL, Id -> ID, Http -> HTTP)
#   ST1005  — error strings should not be capitalized
#   ST1008  — error should be last return value
#   ST1013  — should use http.StatusXxx constants
#   S1021   — merge variable declaration with assignment
#   S1031   — unnecessary nil check around range
#
# SA5008 — "duplicate struct tag" — false positive for go-flags, which uses
# repeated `choice:` / `default:` tags as a library idiom to enumerate
# multiple allowed values / multi-value defaults.
checks = ["all", "-ST1000", "-ST1003", "-ST1005", "-ST1008", "-ST1013", "-S1021", "-S1031", "-SA5008"]
